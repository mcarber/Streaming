<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ficha</title>
<link rel="stylesheet" href="css/sim.css">
</head>

<body class="ficha-body">

<canvas id="space-canvas"></canvas>

<div class="ficha-netflix">

    <div class="ficha-overlay"></div>

    <div class="ficha-content">

        <img id="ficha-img" class="poster">

        <div class="info">
            <h1 id="ficha-titulo"></h1>

            <div class="meta">
                <span class="badge" id="ficha-tipo"></span>
                <span id="ficha-año"></span>
            </div>

            <p id="ficha-desc"></p>

            <p class="prota"><strong>Protagonista:</strong> <span id="ficha-prota"></span></p>

            <button class="btn play">
                ▶ Reproducir
            </button>

            <button class="btn info">
                ℹ Más info
            </button>

            <button class="btn fav" onclick="toggleFav()">
                ❤️ Mi lista
            </button>

</div>
        </div>

    </div>

</div>
<button class="back-btn" onclick="window.close()">← Volver</button>
<script src="js/sim.js"></script>
</body>
</html>
